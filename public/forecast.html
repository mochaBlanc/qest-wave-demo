<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="BIG WAVE 鵠沼サーフィン指数予想ヒートマップ" />
    <title>鵠沼サーフィン指数予想</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/forecast.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="forecast-board forecast-page" aria-labelledby="forecast-title">
        <header class="board-header">
          <div class="title-group">
            <p id="forecast-brand" class="brand">BIG WAVE</p>
            <h1 id="forecast-title">鵠沼サーフィン指数予想</h1>
            <p id="forecast-meta" class="updated-at">更新（JST）：—</p>
            <p id="forecast-area" class="forecast-area">鵠沼・江の島・鎌倉側</p>
          </div>
          <a class="board-link" href="/">今日の指数へ戻る</a>
        </header>

        <div class="wave-divider" aria-hidden="true"></div>

        <p class="forecast-note">3日目以降は予報が変わりやすいため、前日夜と当日朝に再確認してください。</p>
        <p id="today-ended-note" class="forecast-note ended-note" hidden>今日の時間帯はすでに終了しています。明日以降の予測を参考にしてください。</p>

        <div id="forecast-status" class="status" role="status">7日予測を読み込んでいます…</div>

        <div id="forecast-content" class="forecast-content" hidden>
          <section aria-label="指数切り替え">
            <div id="tag-selector" class="tag-selector"></div>
          </section>

          <section aria-label="日付切り替え">
            <div id="day-selector" class="day-selector"></div>
          </section>

          <section class="recommendation-box" aria-labelledby="recommendation-title">
            <div class="section-heading compact-heading">
              <p class="section-kicker">おすすめ</p>
              <h2 id="recommendation-title">この日の候補</h2>
            </div>
            <div id="recommendations" class="recommendations"></div>
          </section>

          <section aria-labelledby="heatmap-title">
            <div class="section-heading compact-heading">
              <p class="section-kicker">HEATMAP</p>
              <h2 id="heatmap-title">スポット別ヒートマップ</h2>
            </div>
            <div id="heatmap" class="heatmap"></div>
          </section>

          <section class="detail-panel" aria-labelledby="detail-title">
            <p class="section-kicker">DETAIL</p>
            <h2 id="detail-title">選択中の枠</h2>
            <div id="detail-content"></div>
          </section>

          <footer class="notice">
            <p id="forecast-notice"></p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>
