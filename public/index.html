<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="鵠沼海岸の時間帯別サーフィン指数を確認できるBIG WAVEデモ" />
    <title>鵠沼サーフィン指数</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <div>
          <p id="brand-label" class="eyebrow">BIG WAVE</p>
          <h1 id="board-title">鵠沼<br class="mobile-break" />サーフィン指数</h1>
          <p class="lede">初心者と経験者ロングボードの判断材料を、時間帯ごとに。</p>
        </div>
        <button id="refresh-button" class="refresh-button" type="button">
          <span aria-hidden="true">↻</span> 最新表示
        </button>
      </header>

      <section id="status" class="status" role="status">海況データを読み込んでいます…</section>

      <div id="content" class="content" hidden>
        <section class="summary-card card">
          <div class="summary-topline">
            <span id="safety-level" class="safety-pill"></span>
            <span id="updated-at" class="updated-at"></span>
          </div>
          <p id="today-summary" class="summary-text"></p>
          <div class="index-grid">
            <article class="index-item">
              <p class="index-label">初心者</p>
              <p id="beginner-stars" class="stars" aria-label="初心者指数"></p>
              <p id="beginner-best" class="best-time"></p>
            </article>
            <article class="index-item">
              <p class="index-label">経験者ロングボード</p>
              <p id="longboard-stars" class="stars" aria-label="ロングボード指数"></p>
              <p id="advanced-best" class="best-time"></p>
            </article>
          </div>
        </section>

        <section aria-labelledby="slots-title">
          <div class="section-heading">
            <div>
              <p class="section-kicker">TIME SLOTS</p>
              <h2 id="slots-title">時間帯別コンディション</h2>
            </div>
          </div>
          <div id="slot-grid" class="slot-grid"></div>
        </section>

        <aside class="notice-card card">
          <span class="notice-icon" aria-hidden="true">i</span>
          <p id="notice"></p>
        </aside>
      </div>
    </main>
  </body>
</html>
