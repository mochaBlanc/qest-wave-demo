<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="鵠沼海岸の時間帯別サーフィン指数を確認できるBIG WAVEデモ" />
    <title>鵠沼サーフィン指数</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="forecast-board" aria-labelledby="board-title">
        <header class="board-header">
          <div class="title-group">
            <p id="brand-label" class="brand">BIG WAVE</p>
            <h1 id="board-title">鵠沼サーフィン指数</h1>
            <p id="updated-at" class="updated-at">更新（JST）：—</p>
          </div>
          <div class="header-actions">
            <a class="board-link" href="/forecast">7日予測を見る</a>
            <button id="refresh-button" class="refresh-button" type="button">更新</button>
          </div>
        </header>

        <div class="wave-divider" aria-hidden="true"></div>

        <div id="status" class="status" role="status">海況データを読み込んでいます…</div>

        <div id="content" class="content" hidden>
          <section class="summary-box" aria-label="本日の概要">
            <p id="today-summary" class="summary-text"></p>
          </section>

          <section class="score-grid" aria-label="メイン指数">
            <article class="score-card">
              <div class="score-head">
                <p class="card-label">初心者指数</p>
                <p id="beginner-stars" class="score-value" aria-label="初心者指数"></p>
              </div>
              <p id="beginner-message" class="score-message"></p>
            </article>
            <article class="score-card">
              <div class="score-head">
                <p class="card-label">おすすめ板種</p>
                <p id="expert-stars" class="score-value" aria-label="経験者向けおすすめ指数"></p>
              </div>
              <div id="recommended-types" class="board-type-list"></div>
              <p id="advanced-message" class="score-message"></p>
            </article>
          </section>

          <section class="best-time-board" aria-label="おすすめ時間">
            <p><span>初心者おすすめ</span><strong id="beginner-best"></strong></p>
            <p><span>経験者おすすめ</span><strong id="advanced-best"></strong></p>
          </section>
        </div>
      </section>

      <div id="details" class="details" hidden>
        <section id="trend-section" class="trend-section" aria-labelledby="trend-title" hidden>
          <div class="section-heading compact-heading">
            <p class="section-kicker">TREND</p>
            <h2 id="trend-title" class="sr-only">今日の海況トレンド</h2>
          </div>
          <div id="trend-grid" class="trend-grid"></div>
        </section>

        <section aria-labelledby="slots-title">
          <div class="section-heading">
            <p class="section-kicker">時間帯別</p>
            <h2 id="slots-title" class="sr-only">コンディション</h2>
          </div>
          <div id="home-tag-selector" class="tag-selector home-tag-selector" aria-label="表示指数切り替え"></div>
          <div id="slot-grid" class="slot-grid"></div>
        </section>

        <aside class="local-note">
          <p class="info-label">鵠沼ローカルメモ</p>
          <p id="local-note"></p>
        </aside>

        <aside id="water-note-card" class="local-note water-note-card" hidden>
          <p class="info-label">水温・ウェット目安</p>
          <p id="water-note-summary"></p>
          <p id="wetsuit-note-summary"></p>
        </aside>

        <aside id="tide-note-card" class="local-note tide-note-card" hidden>
          <p class="info-label">潮位目安</p>
          <div id="tide-note-items" class="tide-note-items"></div>
          <p id="tide-note-summary" class="tide-note-summary" hidden></p>
        </aside>

        <aside class="local-note live-check-card">
          <p class="info-label">LIVE CHECK</p>
          <a
            class="live-check-link"
            href="https://www.youtube.com/live/DZWA9Xicaxg?si=5cTp2UpcmJWBxMDa"
            target="_blank"
            rel="noopener noreferrer"
          >
            鵠沼③水族館前〜銅像前☆☆☆
          </a>
          <p class="live-check-provider">藤沢市鵠沼海岸・YouTubeライブ動画：NAMIARUMOVIE提供</p>
          <p class="live-check-description">白波・混雑・面の乱れを確認</p>
        </aside>

        <footer class="notice">
          <p id="notice"></p>
        </footer>
      </div>
    </main>
  </body>
</html>
