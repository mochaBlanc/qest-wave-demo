<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="鵠沼海岸の時間帯別サーフィン指数を確認できるBIG WAVEデモ" />
    <title>鵠沼サーフィン指数</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-board" aria-labelledby="board-title">
        <div class="wave-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="enoshima-mark" aria-hidden="true">
          <span class="island"></span>
          <span class="tower"></span>
        </div>

        <header class="hero-header">
          <div>
            <p id="brand-label" class="brand">BIG WAVE</p>
            <h1 id="board-title">鵠沼サーフィン指数</h1>
          </div>
          <button id="refresh-button" class="refresh-button" type="button">
            <span aria-hidden="true">↻</span>
            最新表示
          </button>
        </header>

        <div id="status" class="status" role="status">海況データを読み込んでいます…</div>

        <div id="content" class="content" hidden>
          <p id="updated-at" class="updated-at"></p>
          <p id="today-summary" class="summary-text"></p>

          <section class="score-grid" aria-label="メイン指数">
            <article class="score-card">
              <p class="card-label">初心者指数</p>
              <p id="beginner-stars" class="stars" aria-label="初心者指数"></p>
              <p id="beginner-message" class="score-message"></p>
            </article>
            <article class="score-card">
              <p class="card-label">ロングボード指数</p>
              <p id="longboard-stars" class="stars" aria-label="ロングボード指数"></p>
              <p id="advanced-message" class="score-message"></p>
            </article>
          </section>

          <section class="best-time-grid" aria-label="おすすめ時間">
            <article class="best-time-card">
              <p class="card-label">初心者おすすめ時間</p>
              <strong id="beginner-best"></strong>
            </article>
            <article class="best-time-card">
              <p class="card-label">ロングボードおすすめ時間</p>
              <strong id="advanced-best"></strong>
            </article>
          </section>
        </div>
      </section>

      <div id="details" class="details" hidden>
        <section aria-labelledby="slots-title">
          <div class="section-heading">
            <p class="section-kicker">TIME BOARD</p>
            <h2 id="slots-title">時間帯別コンディション</h2>
          </div>
          <div id="slot-grid" class="slot-grid"></div>
        </section>

        <aside class="local-note">
          <p class="info-label">鵠沼ローカルメモ</p>
          <p id="local-note"></p>
        </aside>

        <footer class="notice">
          <p id="notice"></p>
        </footer>
      </div>
    </main>
  </body>
</html>
